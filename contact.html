<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Miracle Fx Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body {background:#f5f7fb;color:#0f172a;}
a {text-decoration:none;color:inherit;}

/* HEADER */
header {
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 8%;background:#1e3a8a;color:#fff;
  position:sticky;top:0;z-index:1000;
}
.logo-area {display:flex;align-items:center;gap:10px;}
.logo-area img {height:40px;border-radius:6px;}
.logo-text span {display:block;font-weight:700;}

.nav-btn {
  background:#fff;color:#1e3a8a;padding:8px 16px;
  border:none;border-radius:6px;font-weight:700;
}

/* DROPDOWN */
.dropdown {
  position:absolute;right:8%;top:65px;
  background:#fff;border-radius:10px;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  min-width:200px;
  opacity:0;transform:translateY(-10px);
  pointer-events:none;transition:0.3s;
}
.dropdown a {
  display:block;padding:12px 20px;
  font-weight:600;color:#1e3a8a;
}
.dropdown a:hover {background:#f1f5f9;}
.dropdown.show {
  opacity:1;transform:translateY(0);
  pointer-events:auto;
}

/* HEADER TEXT */
.page-header {
  text-align:center;padding:60px 20px;
  background:linear-gradient(90deg,#1e3a8a,#3b82f6);
  color:#fff;border-radius:20px;margin:20px 8%;
}

/* CONTACT */
.contact-container {
  display:grid;grid-template-columns:1fr 1fr;
  gap:30px;max-width:1100px;margin:50px auto;padding:0 20px;
}

.contact-info, .contact-form {
  background:#fff;border-radius:20px;padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* INFO CARDS */
.info-card {
  display:flex;align-items:center;gap:15px;
  padding:14px;border-radius:12px;
  background:#f1f5f9;margin-bottom:12px;
  cursor:pointer;transition:0.2s;
}

.info-card i {
  font-size:20px;
  color:#1e3a8a;
  width:25px;
}

.info-card:hover {
  background:#e0e7ff;
  transform:translateY(-2px);
}

/* FORM */
.contact-form form {
  display:flex;flex-direction:column;gap:12px;
}
.contact-form input, .contact-form textarea {
  padding:10px;border-radius:10px;border:1px solid #e2e8f0;
}
.contact-form button {
  padding:12px;background:#1e3a8a;color:#fff;
  border:none;border-radius:10px;font-weight:700;
  cursor:pointer;
}

/* FOOTER */
footer {
  background:#1e3a8a;color:#fff;text-align:center;
  padding:20px;margin-top:40px;
}

@media(max-width:768px){
  .contact-container {grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<div class="logo-area">
<img src="./asset/image/Miracle Fx Logo.png">
<div class="logo-text">
<span>Miracle Fx</span>
<span>Academy</span>
</div>
</div>

<button class="nav-btn" onclick="toggleMenu()">Menu ☰</button>

<div class="dropdown" id="menu">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="trading-programs.html">Programs</a>
<a href="#">Contact</a>
</div>
</header>

<section class="page-header">
<h1>Contact Us</h1>
<p>We are here to help you grow in Forex trading</p>
</section>

<section class="contact-container">

<!-- INFO -->
<div class="contact-info">

<div class="info-card" onclick="window.open('https://wa.me/2349070629367','_blank')">
<i class="fab fa-whatsapp"></i>
<span>+2349070629367 (WhatsApp)</span>
</div>

<div class="info-card" onclick="window.open('mailto:miracleforex24@gmail.com','_blank')">
<i class="fas fa-envelope"></i>
<span>miracleforex24@gmail.com</span>
</div>

<div class="info-card">
<i class="fas fa-location-dot"></i>
<span>Nigeria</span>
</div>

</div>

<!-- FORM -->
<div class="contact-form">
<h2>Send Message</h2>
<form id="contactForm">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" rows="4" placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
</form>
</div>

</section>

<footer>
<p>© 2026 Wise Tech. All rights reserved.</p>
</footer>

<script>
const menu = document.getElementById("menu");

function toggleMenu(){
  menu.classList.toggle("show");
}

document.querySelectorAll(".dropdown a").forEach(link=>{
  link.addEventListener("click", ()=>{
    menu.classList.remove("show");
  });
});

document.addEventListener("click", (e)=>{
  if(!e.target.closest(".nav-btn") && !e.target.closest(".dropdown")){
    menu.classList.remove("show");
  }
});

/* FORM TO WHATSAPP */
document.getElementById('contactForm').addEventListener('submit', function(e){
  e.preventDefault();
  const name = this.name.value;
  const email = this.email.value;
  const message = this.message.value;

  const text = `Hello Coach, I am ${name} (${email}). ${message}`;
  const url = `https://wa.me/2349070629367?text=${encodeURIComponent(text)}`;

  window.open(url,'_blank');
});
</script>

</body>
</html>
